name: Deploy Bicep to Azure

on:
  # push:
  #   branches: [ main ]
  #   paths:
  #     - 'main-bicep/**'
  #     - '.github/workflows/deploy-lab.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (lab, dev, prod)'
        required: false
        default: 'lab'
      natPublicIP:
        description: 'Override NAT public IP for this run'
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        enable-AzPSSession: false

    - name: Deploy Bicep
      run: |
        # Use an inline SSH key variable or skip if not needed
        SSH_KEY=$(echo "${{ secrets.SSH_PUBLIC_KEY }}" | tr -d '\r')
        ACCESS_KEY=$(echo "${{ secrets.HUB_ACCESS_KEY }}" | tr -d '\r')
        NAT_IP="${{ github.event.inputs.natPublicIP }}"
        if [ -z "$NAT_IP" ]; then
          NAT_IP=$(echo "${{ secrets.NAT_PUBLIC_IP }}" | tr -d '\r')
        fi
        if [ -z "$NAT_IP" ]; then
          echo "❌ NAT public IP is required. Provide workflow_dispatch input 'natPublicIP' or set the NAT_PUBLIC_IP secret."
          exit 1
        fi
        az deployment sub create \
          --template-file main-bicep/hubmain.bicep \
          --parameters natPublicIP="${NAT_IP}" accessKey="${ACCESS_KEY}" sshPublicKey="${SSH_KEY}" \
          --location westus \
          --what-if
